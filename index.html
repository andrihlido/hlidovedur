<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veður</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --frost:#e8f4ff; --ice:#c8e6ff; --muted:#7aa8cc; --gold:#f0c060; --green:#00c8a0; }

/* Eitt vmin-gildi stjórnar öllu */
html { font-size:2.2vmin; }
body {
  width:100%; height:100vh;
  background:#0a1628;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  color:#e8f4ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Bakgrunnur */
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% 0%, rgba(0,200,160,.13) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 85% 5%,  rgba(96,64,224,.1) 0%, transparent 50%),
    linear-gradient(180deg, #081220 0%, #0c1a30 50%, #081220 100%);
  animation:adrift 14s ease-in-out infinite alternate;
}
@keyframes adrift {
  0%   { filter:hue-rotate(0deg); }
  100% { filter:hue-rotate(20deg) brightness(1.06); }
}

/* Fjöll */
.mountains { position:fixed; bottom:0; left:0; right:0; z-index:1; height:20%; }
.mountains svg { width:100%; height:100%; }

/* ── Aðalkassinn ── */
.widget {
  position:relative; z-index:10;
  display:inline-flex;
  flex-direction:column;
  gap:.8em;
  /* Aldrei breiðari en 95% af skjánum */
  max-width:95vw;
}

/* Efri hluti: hiti til vinstri, kort til hægri — BÆÐI standa náið saman */
.row-main {
  display:flex;
  flex-direction:row;
  align-items:stretch;
  gap:1.2em;
}

/* Hiti-blokk */
.temp-block {
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:.2em;
  flex-shrink:0;
}

.loc-row { display:flex; align-items:center; gap:.35em; }
.loc-dot {
  width:.4em; height:.4em; border-radius:50%; flex-shrink:0;
  background:var(--green); box-shadow:0 0 .5em var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.4)} }
.loc-name { font-size:.8em; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }

.temp-num {
  font-family:'DM Serif Display',serif;
  font-size:7em; line-height:.82;
  color:var(--frost); letter-spacing:-.02em;
}
.temp-deg {
  font-family:'DM Serif Display',serif;
  font-size:2.6em; color:var(--muted);
  vertical-align:super; margin-left:.06em;
}

.cond-row { display:flex; align-items:center; gap:.4em; margin-top:.2em; }
.cond-icon { font-size:1.5em; }
.cond-text {
  font-family:'DM Serif Display',serif; font-style:italic;
  font-size:1.4em; color:var(--ice);
}

/* 2×2 kortakerfi */
.cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:.5em;
  flex:1;
}
.card {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(200,230,255,.11);
  border-radius:.65em;
  padding:.5em .75em;
  display:flex; flex-direction:column; gap:.08em;
}
.card-label {
  font-size:.58em; letter-spacing:.11em;
  text-transform:uppercase; color:var(--muted); font-weight:500;
}
.card-val {
  font-family:'DM Serif Display',serif;
  font-size:2em; line-height:1; color:var(--frost);
}
.card-unit { font-size:.44em; color:var(--muted); font-weight:300; }
.card-sub  { font-size:.58em; color:var(--muted); }

/* Neðri hluti: klukka + hnapparnir */
.row-bottom {
  display:flex;
  flex-direction:row;
  justify-content:space-between;
  align-items:flex-end;
  gap:1em;
}

.clock { display:flex; flex-direction:column; gap:.05em; }
.clock-time {
  font-family:'DM Serif Display',serif;
  font-size:2.4em; line-height:1;
  color:var(--gold); letter-spacing:.03em;
}
.clock-date { font-size:.7em; color:var(--muted); letter-spacing:.05em; }

.loc-btns-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:.35em; }
.loc-btns { display:flex; gap:.28em; flex-wrap:wrap; justify-content:flex-end; }
.loc-btn {
  background:rgba(255,255,255,.05); border:1px solid rgba(200,230,255,.14);
  border-radius:2em; color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:.58em; letter-spacing:.07em; padding:.28em .75em;
  cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.loc-btn:hover { background:rgba(200,230,255,.1); color:var(--frost); }
.loc-btn.active { border-color:var(--green); color:var(--green); }
.updated { font-size:.5em; color:rgba(120,168,204,.38); letter-spacing:.04em; }

/* Loading */
.loading {
  position:fixed; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1em;
  background:rgba(8,18,32,.92);
  transition:opacity .4s;
}
.loading.hidden { opacity:0; pointer-events:none; }
.spin {
  width:2em; height:2em;
  border:.16em solid rgba(200,230,255,.1); border-top-color:var(--green);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:.8em; color:var(--muted); letter-spacing:.1em; }

@keyframes up { from{opacity:0;transform:translateY(.5em)} to{opacity:1;transform:none} }
.widget { animation:up .7s .1s both; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="mountains">
  <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,200 L0,150 L90,118 L170,138 L230,78 L290,108 L350,45 L410,82 L470,52 L530,98 L595,28 L650,68 L710,14 L770,62 L830,24 L890,82 L950,38 L1010,86 L1070,48 L1130,92 L1195,55 L1255,108 L1315,68 L1375,115 L1440,84 L1440,200 Z" fill="rgba(6,14,28,.96)"/>
    <path d="M0,200 L0,182 L130,162 L210,176 L290,148 L370,168 L450,132 L530,155 L610,124 L690,150 L770,118 L850,148 L930,120 L1010,150 L1090,128 L1170,158 L1250,136 L1330,164 L1440,148 L1440,200 Z" fill="rgba(6,14,28,1)"/>
  </svg>
</div>

<div class="loading" id="loading">
  <div class="spin"></div>
  <p id="loadTxt">Sæki veðurupplýsingar…</p>
</div>

<div class="widget">
  <div class="row-main">
    <!-- Hiti -->
    <div class="temp-block">
      <div class="loc-row">
        <div class="loc-dot"></div>
        <span class="loc-name" id="locName">Reykjavík</span>
      </div>
      <div>
        <span class="temp-num" id="tempNum">—</span><span class="temp-deg">°C</span>
      </div>
      <div class="cond-row">
        <span class="cond-icon" id="condIcon">🌡</span>
        <span class="cond-text" id="condText">Hleð…</span>
      </div>
    </div>

    <!-- 2×2 kort -->
    <div class="cards">
      <div class="card">
        <span class="card-label">Vindhraði</span>
        <span class="card-val" id="wind">—<span class="card-unit"> m/s</span></span>
        <span class="card-sub" id="windDir">—</span>
      </div>
      <div class="card">
        <span class="card-label">Rakastig</span>
        <span class="card-val" id="hum">—<span class="card-unit"> %</span></span>
        <span class="card-sub">Hlutfallslegt</span>
      </div>
      <div class="card">
        <span class="card-label">Skynhiti</span>
        <span class="card-val" id="feels">—<span class="card-unit"> °C</span></span>
        <span class="card-sub">Vindkæling</span>
      </div>
      <div class="card">
        <span class="card-label">Úrkoma</span>
        <span class="card-val" id="precip">—<span class="card-unit"> mm</span></span>
        <span class="card-sub">Sl. klukkustund</span>
      </div>
    </div>
  </div>

  <!-- Klukka + staðahnapparnir -->
  <div class="row-bottom">
    <div class="clock">
      <div class="clock-time" id="clockTime">—</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
    <div class="loc-btns-wrap">
      <div class="loc-btns" id="locBtns">
        <button class="loc-btn active" data-lat="64.1355" data-lon="-21.8954" data-name="Reykjavík">Reykjavík</button>
        <button class="loc-btn" data-lat="65.6826" data-lon="-18.0921" data-name="Akureyri">Akureyri</button>
        <button class="loc-btn" data-lat="63.9996" data-lon="-22.5562" data-name="Keflavík">Keflavík</button>
        <button class="loc-btn" data-lat="64.6328" data-lon="-21.9581" data-name="Borgarnes">Borgarnes</button>
        <button class="loc-btn" data-lat="64.2539" data-lon="-15.2082" data-name="Höfn">Höfn</button>
      </div>
      <div class="updated" id="updated">Uppfærist sjálfkrafa á 10 mín. fresti</div>
    </div>
  </div>
</div>

<script>
const WMO = {
  0:{is:'Tært',icon:'☀️'}, 1:{is:'Aðallega tært',icon:'🌤'}, 2:{is:'Hlutskýjað',icon:'⛅️'}, 3:{is:'Skýjað',icon:'☁️'},
  45:{is:'Þoka',icon:'🌫'}, 48:{is:'Hrímþoka',icon:'🌫'},
  51:{is:'Létt súld',icon:'🌦'}, 53:{is:'Súld',icon:'🌦'}, 55:{is:'Þung súld',icon:'🌧'},
  61:{is:'Létt rigning',icon:'🌧'}, 63:{is:'Rigning',icon:'🌧'}, 65:{is:'Þung rigning',icon:'🌧'},
  71:{is:'Létt snjókoma',icon:'🌨'}, 73:{is:'Snjókoma',icon:'❄️'}, 75:{is:'Þung snjókoma',icon:'❄️'}, 77:{is:'Snjókornaél',icon:'🌨'},
  80:{is:'Létar skúrir',icon:'🌦'}, 81:{is:'Skúrir',icon:'🌧'}, 82:{is:'Þungar skúrir',icon:'⛈'},
  85:{is:'Snjóskúrir',icon:'🌨'}, 86:{is:'Þungar snjóskúrir',icon:'❄️'},
  95:{is:'Þrumuveður',icon:'⛈'}, 96:{is:'Þrumuveður m. hagli',icon:'⛈'}, 99:{is:'Þrumuveður m. hagli',icon:'⛈'},
};

function vindatt(d) {
  return ['Norðan','Norðaustan','Austan','Suðaustan','Suðan','Suðvestan','Vestan','Norðvestan'][Math.round(d/45)%8]+'vindur';
}
function skynhiti(T,v) {
  const k=v*3.6; if(T<=10&&k>=4.8) return Math.round(13.12+0.6215*T-11.37*k**.16+0.3965*T*k**.16);
  return Math.round(T);
}

let lat=64.1355, lon=-21.8954, statur='Reykjavík';

async function saekja() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loadTxt').textContent = 'Sæki veðurupplýsingar…';
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,precipitation&wind_speed_unit=ms&timezone=Atlantic/Reykjavik`);
    const {current:c} = await r.json();
    const w = WMO[c.weathercode]||{is:'Óþekkt',icon:'🌡'};
    document.getElementById('tempNum').textContent   = Math.round(c.temperature_2m);
    document.getElementById('condIcon').textContent  = w.icon;
    document.getElementById('condText').textContent  = w.is;
    document.getElementById('wind').innerHTML        = `${c.windspeed_10m.toFixed(1)}<span class="card-unit"> m/s</span>`;
    document.getElementById('windDir').textContent   = vindatt(c.winddirection_10m);
    document.getElementById('hum').innerHTML         = `${c.relativehumidity_2m}<span class="card-unit"> %</span>`;
    document.getElementById('feels').innerHTML       = `${skynhiti(c.temperature_2m,c.windspeed_10m)}<span class="card-unit"> °C</span>`;
    document.getElementById('precip').innerHTML      = `${c.precipitation.toFixed(1)}<span class="card-unit"> mm</span>`;
    document.getElementById('locName').textContent   = statur;
    const n=new Date();
    document.getElementById('updated').textContent   = `Síðast uppfært: ${pad(n.getHours())}:${pad(n.getMinutes())}`;
    document.getElementById('loading').classList.add('hidden');
  } catch {
    document.getElementById('loadTxt').textContent = 'Gat ekki sótt veðrið. Reyndu aftur.';
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),3000);
  }
}

const DAGAR=[' Sunnudagur','Mánudagur','Þriðjudagur','Miðvikudagur','Fimmtudagur','Föstudagur','Laugardagur'];
const MAN=['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
const pad=n=>String(n).padStart(2,'0');

function klukka() {
  const n=new Date();
  document.getElementById('clockTime').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
  document.getElementById('clockDate').textContent = `${DAGAR[n.getDay()]}, ${n.getDate()}. ${MAN[n.getMonth()]} ${n.getFullYear()}`;
}

document.getElementById('locBtns').addEventListener('click',e=>{
  const b=e.target.closest('.loc-btn'); if(!b) return;
  document.querySelectorAll('.loc-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  lat=+b.dataset.lat; lon=+b.dataset.lon; statur=b.dataset.name;
  saekja();
});

klukka(); setInterval(klukka,1000);
saekja(); setInterval(saekja,600000);
</script>
</body>
</html>
