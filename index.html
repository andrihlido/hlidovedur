<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veður í dag</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #0a1628;
    --mid: #0e2040;
    --glow: #1a4a8a;
    --ice: #c8e6ff;
    --frost: #e8f4ff;
    --gold: #f0c060;
    --aurora1: #00c8a0;
    --aurora2: #6040e0;
    --text: #e8f4ff;
    --muted: #7aa8cc;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--sky);
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* Aurora background */
  .aurora {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 40% at 20% 0%, rgba(0,200,160,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 10%, rgba(96,64,224,0.12) 0%, transparent 50%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(14,32,64,0.9) 0%, transparent 70%),
      linear-gradient(180deg, #0a1628 0%, #0d1f3c 40%, #0a1628 100%);
    animation: aurora-drift 12s ease-in-out infinite alternate;
  }
  @keyframes aurora-drift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    50%  { filter: hue-rotate(15deg) brightness(1.08); }
    100% { filter: hue-rotate(-10deg) brightness(0.95); }
  }

  /* Stars */
  .stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 5%,  rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 33% 12%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(2px 2px at 70% 25%, rgba(255,255,255,0.7) 0%, transparent 100%);
  }

  /* Mountains silhouette */
  .mountains {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1;
    height: 35%;
  }
  .mountains svg { width: 100%; height: 100%; }

  /* Main layout */
  .container {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 5vh 6vw;
    gap: 2vh;
  }

  .top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 4vw;
  }

  /* Left: main weather */
  .main-weather {
    display: flex;
    flex-direction: column;
    gap: 1.5vh;
  }

  .location-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    opacity: 0;
    animation: fade-up 0.8s 0.2s forwards;
  }
  .location-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--aurora1);
    box-shadow: 0 0 12px var(--aurora1);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }
  .location-name {
    font-size: clamp(0.9rem, 1.8vw, 1.3rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .temp-display {
    opacity: 0;
    animation: fade-up 0.8s 0.4s forwards;
  }
  .temp-number {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(5rem, 18vw, 14rem);
    line-height: 0.85;
    color: var(--frost);
    text-shadow: 0 0 60px rgba(200,230,255,0.3);
    letter-spacing: -0.02em;
  }
  .temp-unit {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    color: var(--muted);
    vertical-align: super;
    margin-left: 0.2em;
  }

  .condition-row {
    opacity: 0;
    animation: fade-up 0.8s 0.6s forwards;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .weather-icon {
    font-size: clamp(2rem, 4vw, 3.5rem);
    line-height: 1;
    filter: drop-shadow(0 0 15px rgba(240,192,96,0.5));
  }
  .condition-text {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    color: var(--ice);
    line-height: 1.2;
  }

  /* Right: details */
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(0.8rem, 2vw, 1.5rem);
    opacity: 0;
    animation: fade-up 0.8s 0.7s forwards;
  }

  .detail-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,230,255,0.1);
    border-radius: 1.5rem;
    padding: clamp(1rem, 2.5vw, 2rem);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    backdrop-filter: blur(10px);
    transition: background 0.3s;
  }
  .detail-card:hover {
    background: rgba(255,255,255,0.07);
  }
  .detail-label {
    font-size: clamp(0.65rem, 1.1vw, 0.85rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .detail-value {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 3.2rem);
    line-height: 1;
    color: var(--frost);
  }
  .detail-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.55em;
    color: var(--muted);
    font-weight: 300;
  }
  .detail-sub {
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    color: var(--muted);
  }

  /* Bottom: time + date + settings */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fade-up 0.8s 0.9s forwards;
  }

  .datetime {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .time-display {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,96,0.4);
    letter-spacing: 0.02em;
  }
  .date-display {
    font-size: clamp(0.75rem, 1.3vw, 1rem);
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: capitalize;
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.8rem;
  }
  .location-selector {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .loc-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,230,255,0.15);
    border-radius: 2rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    letter-spacing: 0.08em;
    padding: 0.4em 1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .loc-btn:hover, .loc-btn.active {
    background: rgba(200,230,255,0.12);
    border-color: rgba(200,230,255,0.4);
    color: var(--frost);
  }
  .loc-btn.active {
    border-color: var(--aurora1);
    color: var(--aurora1);
    box-shadow: 0 0 12px rgba(0,200,160,0.2);
  }
  .update-info {
    font-size: clamp(0.55rem, 0.9vw, 0.7rem);
    color: rgba(120, 168, 204, 0.5);
    letter-spacing: 0.05em;
  }

  /* Loading / error */
  .status-overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,22,40,0.9);
    backdrop-filter: blur(20px);
    flex-direction: column;
    gap: 1.5rem;
    transition: opacity 0.5s;
  }
  .status-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(200,230,255,0.1);
    border-top-color: var(--aurora1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text {
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-weight: 300;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 700px) {
    .top { grid-template-columns: 1fr; }
    .details-grid { grid-template-columns: 1fr 1fr; }
    .temp-number { font-size: clamp(4rem, 25vw, 8rem); }
  }
</style>
</head>
<body>

<div class="aurora"></div>
<div class="stars"></div>

<!-- Mountain silhouette -->
<div class="mountains">
  <svg viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,300 L0,220 L80,180 L160,200 L220,120 L280,160 L340,80 L400,130 L460,90 L520,150 L580,60 L640,110 L700,40 L760,100 L820,50 L880,120 L940,70 L1000,130 L1060,85 L1120,140 L1180,95 L1240,160 L1300,110 L1360,170 L1440,130 L1440,300 Z" fill="rgba(8,16,30,0.95)"/>
    <path d="M0,300 L0,260 L120,230 L200,250 L280,200 L360,230 L440,180 L520,210 L600,170 L680,200 L760,160 L840,195 L920,165 L1000,200 L1080,175 L1160,210 L1240,185 L1320,220 L1440,200 L1440,300 Z" fill="rgba(8,16,30,1)"/>
  </svg>
</div>

<!-- Status overlay -->
<div class="status-overlay" id="statusOverlay">
  <div class="spinner"></div>
  <div class="status-text" id="statusText">Sæki veðurupplýsingar…</div>
</div>

<!-- Main content -->
<div class="container">
  <div class="top">
    <!-- Left: main temp + condition -->
    <div class="main-weather">
      <div class="location-row">
        <div class="location-dot"></div>
        <span class="location-name" id="locationName">Reykjavík</span>
      </div>
      <div class="temp-display">
        <span class="temp-number" id="tempNum">—</span><span class="temp-unit">°C</span>
      </div>
      <div class="condition-row">
        <span class="weather-icon" id="weatherIcon">🌡</span>
        <span class="condition-text" id="conditionText">Hleð…</span>
      </div>
    </div>

    <!-- Right: detail cards -->
    <div class="details-grid">
      <div class="detail-card">
        <span class="detail-label">Vindhraði</span>
        <span class="detail-value" id="windSpeed">—<span class="detail-unit"> m/s</span></span>
        <span class="detail-sub" id="windDir">—</span>
      </div>
      <div class="detail-card">
        <span class="detail-label">Rakastig</span>
        <span class="detail-value" id="humidity">—<span class="detail-unit"> %</span></span>
        <span class="detail-sub">Hlutfallslegt</span>
      </div>
      <div class="detail-card">
        <span class="detail-label">Líður eins og</span>
        <span class="detail-value" id="feelsLike">—<span class="detail-unit"> °C</span></span>
        <span class="detail-sub">Vindkæling</span>
      </div>
      <div class="detail-card">
        <span class="detail-label">Úrkoma</span>
        <span class="detail-value" id="precip">—<span class="detail-unit"> mm</span></span>
        <span class="detail-sub">Síðastliðna klukkustund</span>
      </div>
    </div>
  </div>

  <!-- Bottom: time/date + location buttons -->
  <div class="bottom">
    <div class="datetime">
      <div class="time-display" id="timeDisplay">—</div>
      <div class="date-display" id="dateDisplay">—</div>
    </div>
    <div class="controls">
      <div class="location-selector" id="locBtns">
        <button class="loc-btn active" data-lat="64.1355" data-lon="-21.8954" data-name="Reykjavík">Reykjavík</button>
        <button class="loc-btn" data-lat="65.6826" data-lon="-18.0921" data-name="Akureyri">Akureyri</button>
        <button class="loc-btn" data-lat="63.9996" data-lon="-22.5562" data-name="Keflavík">Keflavík</button>
        <button class="loc-btn" data-lat="64.6328" data-lon="-21.9581" data-name="Borgarnes">Borgarnes</button>
        <button class="loc-btn" data-lat="64.2539" data-lon="-15.2082" data-name="Höfn">Höfn</button>
      </div>
      <div class="update-info" id="updateInfo">Uppfærist sjálfkrafa</div>
    </div>
  </div>
</div>

<script>
// --- WMO weather codes → Icelandic + icon ---
const WMO = {
  0:  { is: 'Tært', icon: '☀️' },
  1:  { is: 'Aðallega tært', icon: '🌤' },
  2:  { is: 'Hlutlægt skýjað', icon: '⛅️' },
  3:  { is: 'Skýjað', icon: '☁️' },
  45: { is: 'Þoka', icon: '🌫' },
  48: { is: 'Frystingaþoka', icon: '🌫' },
  51: { is: 'Léttur úðaregn', icon: '🌦' },
  53: { is: 'Miðlungsmikill úðaregn', icon: '🌦' },
  55: { is: 'Þungur úðaregn', icon: '🌧' },
  61: { is: 'Léttur rigning', icon: '🌧' },
  63: { is: 'Miðlungsmikil rigning', icon: '🌧' },
  65: { is: 'Þung rigning', icon: '🌧' },
  71: { is: 'Létt snjókoma', icon: '🌨' },
  73: { is: 'Miðlungsmikil snjókoma', icon: '❄️' },
  75: { is: 'Þung snjókoma', icon: '❄️' },
  77: { is: 'Snjókornaél', icon: '🌨' },
  80: { is: 'Létt skúrir', icon: '🌦' },
  81: { is: 'Miðlungs skúrir', icon: '🌧' },
  82: { is: 'Þungar skúrir', icon: '⛈' },
  85: { is: 'Snjóskúrir', icon: '🌨' },
  86: { is: 'Þungar snjóskúrir', icon: '❄️' },
  95: { is: 'Þrumuveður', icon: '⛈' },
  96: { is: 'Þrumuveður með hagli', icon: '⛈' },
  99: { is: 'Þrumuveður með þungum hagli', icon: '⛈' },
};

function windDirLabel(deg) {
  const dirs = ['N','NA','A','SA','S','SV','V','NV'];
  return dirs[Math.round(deg / 45) % 8];
}

function windDirFull(deg) {
  const dirs = ['Norður','Norðaustur','Austur','Suðaustur','Suður','Suðvestur','Vestur','Norðvestur'];
  return dirs[Math.round(deg / 45) % 8];
}

function feelsLikeCalc(temp, wind) {
  // Wind chill (valid when temp ≤ 10°C and wind ≥ 1.3 m/s)
  const wkmh = wind * 3.6;
  if (temp <= 10 && wkmh >= 4.8) {
    return Math.round(13.12 + 0.6215*temp - 11.37*Math.pow(wkmh,0.16) + 0.3965*temp*Math.pow(wkmh,0.16));
  }
  return Math.round(temp);
}

let currentLat = 64.1355;
let currentLon = -21.8954;
let currentLocName = 'Reykjavík';

async function fetchWeather() {
  const overlay = document.getElementById('statusOverlay');
  const statusText = document.getElementById('statusText');
  overlay.classList.remove('hidden');
  statusText.textContent = 'Sæki veðurupplýsingar…';
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}`
      + `&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,precipitation`
      + `&wind_speed_unit=ms&timezone=Atlantic/Reykjavik`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;

    const wmo = WMO[c.weathercode] || { is: 'Óþekkt', icon: '🌡' };

    document.getElementById('tempNum').textContent = Math.round(c.temperature_2m);
    document.getElementById('weatherIcon').textContent = wmo.icon;
    document.getElementById('conditionText').textContent = wmo.is;
    document.getElementById('windSpeed').innerHTML = `${c.windspeed_10m.toFixed(1)}<span class="detail-unit"> m/s</span>`;
    document.getElementById('windDir').textContent = windDirFull(c.winddirection_10m);
    document.getElementById('humidity').innerHTML = `${c.relativehumidity_2m}<span class="detail-unit"> %</span>`;
    document.getElementById('feelsLike').innerHTML = `${feelsLikeCalc(c.temperature_2m, c.windspeed_10m)}<span class="detail-unit"> °C</span>`;
    document.getElementById('precip').innerHTML = `${c.precipitation.toFixed(1)}<span class="detail-unit"> mm</span>`;
    document.getElementById('locationName').textContent = currentLocName;

    const now = new Date();
    document.getElementById('updateInfo').textContent = `Síðast uppfært: ${now.toLocaleTimeString('is-IS', {hour:'2-digit', minute:'2-digit'})}`;
    overlay.classList.add('hidden');
  } catch (e) {
    statusText.textContent = 'Gat ekki sótt veðrið. Reyndu aftur.';
    setTimeout(() => overlay.classList.add('hidden'), 3000);
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toLocaleTimeString('is-IS', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('is-IS', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// Location buttons
document.getElementById('locBtns').addEventListener('click', e => {
  const btn = e.target.closest('.loc-btn');
  if (!btn) return;
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLat = parseFloat(btn.dataset.lat);
  currentLon = parseFloat(btn.dataset.lon);
  currentLocName = btn.dataset.name;
  fetchWeather();
});

// Init
updateClock();
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000); // every 10 min
</script>
</body>
</html>
