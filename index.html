<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<title>Veður</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#081220;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100vw; height:100vh;
}

#app {
  width:800px;
  height:800px;
  position:relative;
  overflow:hidden;
  font-family:'DM Sans', sans-serif;
  color:#e8f4ff;
  transform-origin:center center;
}

.bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% -5%, rgba(0,200,160,.18) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 88%  5%, rgba(80,50,220,.13) 0%, transparent 50%),
    linear-gradient(180deg, #081220 0%, #0c1a32 55%, #081220 100%);
}
.stars {
  position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at  8% 8%,  rgba(255,255,255,.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 4%,  rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 38% 12%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 3%,  rgba(255,255,255,.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 9%,  rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 6%,  rgba(255,255,255,.7) 0%, transparent 100%),
    radial-gradient(2px 2px at 30% 6%,  rgba(255,255,255,.9) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 14%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 48% 18%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 15%, rgba(255,255,255,.5) 0%, transparent 100%);
}
.mnt { position:absolute; bottom:0; left:0; right:0; height:180px; }
.mnt svg { width:100%; height:100%; }

/* ─── Allt innihald ─── */
.content {
  position:absolute; inset:0;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  padding:48px 52px 40px;
  gap:0;
}

/* Staðsetning */
.loc-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.loc-dot {
  width:9px; height:9px; border-radius:50%;
  background:#00c8a0; box-shadow:0 0 10px #00c8a0;
  animation:pulse 2s ease-in-out infinite; flex-shrink:0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.5)} }
.loc-name { font-size:13px; letter-spacing:2.5px; text-transform:uppercase; color:#7aa8cc; }

/* Hitastig */
.temp-line { line-height:1; margin-bottom:6px; }
.temp-num  { font-family:'DM Serif Display',serif; font-size:160px; line-height:.82; color:#e8f4ff; letter-spacing:-4px; }
.temp-deg  { font-family:'DM Serif Display',serif; font-size:60px; color:#7aa8cc; vertical-align:super; }

/* Veðurástand */
.cond-row  { display:flex; align-items:center; gap:9px; margin-bottom:28px; }
.cond-icon { font-size:28px; }
.cond-text { font-family:'DM Serif Display',serif; font-style:italic; font-size:28px; color:#c8e6ff; }

/* 2×2 kort */
.cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  width:100%;
  margin-bottom:22px;
}
.card {
  background:rgba(255,255,255,.07);
  border:1px solid rgba(200,230,255,.13);
  border-radius:12px;
  padding:14px 18px;
  display:flex; flex-direction:column; gap:3px;
}
.card-lbl  { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#7aa8cc; font-weight:500; }
.card-val  { font-family:'DM Serif Display',serif; font-size:44px; line-height:1.05; color:#e8f4ff; }
.card-unit { font-size:16px; color:#7aa8cc; font-weight:300; }
.card-sub  { font-size:11px; color:#7aa8cc; }

/* Klukka og dagsetning — rétt fyrir neðan kortin */
.clock-time { font-family:'DM Serif Display',serif; font-size:58px; line-height:1; color:#f0c060; letter-spacing:1px; }
.clock-date { font-size:13px; color:#7aa8cc; letter-spacing:1px; margin-top:4px; }
.updated    { font-size:10px; color:rgba(120,168,204,.4); margin-top:6px; }

/* Loading */
.loading {
  position:absolute; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
  background:rgba(8,18,32,.92);
  transition:opacity .4s;
}
.loading.hidden { opacity:0; pointer-events:none; }
.spin {
  width:36px; height:36px;
  border:3px solid rgba(200,230,255,.1); border-top-color:#00c8a0;
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:14px; color:#7aa8cc; letter-spacing:2px; }
</style>
</head>
<body>
<div id="app">
  <div class="bg"></div>
  <div class="stars"></div>
  <div class="mnt">
    <svg viewBox="0 0 800 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,180 L0,120 L50,95 L95,112 L130,68 L165,88 L200,40 L235,65 L265,48 L300,80 L335,22 L370,55 L400,10 L430,48 L465,26 L500,66 L535,38 L570,70 L605,44 L640,75 L675,50 L710,82 L745,56 L780,88 L800,68 L800,180 Z" fill="rgba(6,13,26,.97)"/>
      <path d="M0,180 L0,160 L70,144 L130,156 L190,132 L250,148 L310,122 L370,138 L430,112 L490,130 L550,108 L610,126 L670,104 L730,122 L800,110 L800,180 Z" fill="rgba(6,13,26,1)"/>
    </svg>
  </div>

  <div class="loading" id="loading">
    <div class="spin"></div>
    <p id="loadTxt">Sæki veðurupplýsingar…</p>
  </div>

  <div class="content">
    <div class="loc-row">
      <div class="loc-dot"></div>
      <span class="loc-name">Reykjavík</span>
    </div>

    <div class="temp-line">
      <span class="temp-num" id="tempNum">—</span><span class="temp-deg">°C</span>
    </div>

    <div class="cond-row">
      <span class="cond-icon" id="condIcon">🌡</span>
      <span class="cond-text" id="condText">Hleð…</span>
    </div>

    <div class="cards">
      <div class="card">
        <span class="card-lbl">Vindhraði</span>
        <span class="card-val" id="wind">—<span class="card-unit"> m/s</span></span>
        <span class="card-sub" id="windDir">—</span>
      </div>
      <div class="card">
        <span class="card-lbl">Rakastig</span>
        <span class="card-val" id="hum">—<span class="card-unit"> %</span></span>
        <span class="card-sub">Hlutfallslegt</span>
      </div>
      <div class="card">
        <span class="card-lbl">Skynhiti</span>
        <span class="card-val" id="feels">—<span class="card-unit"> °C</span></span>
        <span class="card-sub">Vindkæling</span>
      </div>
      <div class="card">
        <span class="card-lbl">Úrkoma</span>
        <span class="card-val" id="precip">—<span class="card-unit"> mm</span></span>
        <span class="card-sub">Sl. klukkustund</span>
      </div>
    </div>

    <div class="clock-time" id="clockTime">—</div>
    <div class="clock-date" id="clockDate">—</div>
    <div class="updated" id="updated">Uppfærist sjálfkrafa á 10 mín. fresti</div>
  </div>
</div>

<script>
function skala() {
  const s = Math.min(window.innerWidth / 800, window.innerHeight / 800);
  document.getElementById('app').style.transform = `scale(${s})`;
}
window.addEventListener('resize', skala);
skala();

const WMO = {
  0:{is:'Tært',i:'☀️'}, 1:{is:'Aðallega tært',i:'🌤'}, 2:{is:'Hlutskýjað',i:'⛅️'}, 3:{is:'Skýjað',i:'☁️'},
  45:{is:'Þoka',i:'🌫'}, 48:{is:'Hrímþoka',i:'🌫'},
  51:{is:'Létt súld',i:'🌦'}, 53:{is:'Súld',i:'🌦'}, 55:{is:'Þung súld',i:'🌧'},
  61:{is:'Létt rigning',i:'🌧'}, 63:{is:'Rigning',i:'🌧'}, 65:{is:'Þung rigning',i:'🌧'},
  71:{is:'Létt snjókoma',i:'🌨'}, 73:{is:'Snjókoma',i:'❄️'}, 75:{is:'Þung snjókoma',i:'❄️'}, 77:{is:'Snjókornaél',i:'🌨'},
  80:{is:'Létar skúrir',i:'🌦'}, 81:{is:'Skúrir',i:'🌧'}, 82:{is:'Þungar skúrir',i:'⛈'},
  85:{is:'Snjóskúrir',i:'🌨'}, 86:{is:'Þungar snjóskúrir',i:'❄️'},
  95:{is:'Þrumuveður',i:'⛈'}, 96:{is:'Þrumuveður m. hagli',i:'⛈'}, 99:{is:'Þrumuveður m. hagli',i:'⛈'},
};
function vindatt(d) {
  return ['Norðan','Norðaustan','Austan','Suðaustan','Suðan','Suðvestan','Vestan','Norðvestan'][Math.round(d/45)%8]+'vindur';
}
function skynhiti(T,v) {
  const k=v*3.6;
  return (T<=10&&k>=4.8) ? Math.round(13.12+0.6215*T-11.37*k**.16+0.3965*T*k**.16) : Math.round(T);
}

async function saekja() {
  document.getElementById('loading').classList.remove('hidden');
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=64.1355&longitude=-21.8954&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,precipitation&wind_speed_unit=ms&timezone=Atlantic/Reykjavik');
    const {current:c} = await r.json();
    const w = WMO[c.weathercode] || {is:'Óþekkt',i:'🌡'};
    document.getElementById('tempNum').textContent  = Math.round(c.temperature_2m);
    document.getElementById('condIcon').textContent = w.i;
    document.getElementById('condText').textContent = w.is;
    document.getElementById('wind').innerHTML       = `${c.windspeed_10m.toFixed(1)}<span class="card-unit"> m/s</span>`;
    document.getElementById('windDir').textContent  = vindatt(c.winddirection_10m);
    document.getElementById('hum').innerHTML        = `${c.relativehumidity_2m}<span class="card-unit"> %</span>`;
    document.getElementById('feels').innerHTML      = `${skynhiti(c.temperature_2m,c.windspeed_10m)}<span class="card-unit"> °C</span>`;
    document.getElementById('precip').innerHTML     = `${c.precipitation.toFixed(1)}<span class="card-unit"> mm</span>`;
    const n=new Date();
    document.getElementById('updated').textContent  = `Síðast uppfært: ${p(n.getHours())}:${p(n.getMinutes())}`;
    document.getElementById('loading').classList.add('hidden');
  } catch {
    document.getElementById('loadTxt').textContent = 'Gat ekki sótt veðrið.';
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),3000);
  }
}

const DAGAR=['Sunnudagur','Mánudagur','Þriðjudagur','Miðvikudagur','Fimmtudagur','Föstudagur','Laugardagur'];
const MAN=['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
const p=n=>String(n).padStart(2,'0');

function klukka() {
  const n=new Date();
  document.getElementById('clockTime').textContent = `${p(n.getHours())}:${p(n.getMinutes())}`;
  document.getElementById('clockDate').textContent = `${DAGAR[n.getDay()]}, ${n.getDate()}. ${MAN[n.getMonth()]} ${n.getFullYear()}`;
}

klukka(); setInterval(klukka, 1000);
saekja(); setInterval(saekja, 600000);
</script>
</body>
</html>
