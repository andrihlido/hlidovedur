<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<title>Veður</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  background:#081220;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100vw; height:100vh;
}

/* ─── Þessi kassi er alltaf 800×450 ─── */
#app {
  width:800px;
  height:450px;
  position:relative;
  overflow:hidden;
  font-family:'DM Sans', sans-serif;
  color:#e8f4ff;
  transform-origin: center center;
}

/* Bakgrunnur — enginn filter animation, enginn blur */
.bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% -5%, rgba(0,200,160,.18) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 88%  5%, rgba(80,50,220,.13) 0%, transparent 50%),
    linear-gradient(180deg, #081220 0%, #0c1a32 55%, #081220 100%);
}

/* Stjörnur */
.stars {
  position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 22%  6%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 38% 18%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55%  4%, rgba(255,255,255,.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 14%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85%  9%, rgba(255,255,255,.7) 0%, transparent 100%),
    radial-gradient(2px 2px at 30%  9%, rgba(255,255,255,.9) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 48% 28%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 22%, rgba(255,255,255,.5) 0%, transparent 100%);
}

/* Fjöll */
.mnt { position:absolute; bottom:0; left:0; right:0; height:120px; }
.mnt svg { width:100%; height:100%; }

/* ─── Innihald ─── */
.content {
  position:absolute; inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:28px 36px 22px;
}

/* Efri hluti */
.top {
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:32px;
}

/* Hiti-blokk */
.temp-block {
  display:flex;
  flex-direction:column;
  gap:4px;
  flex-shrink:0;
}
.loc-row { display:flex; align-items:center; gap:7px; }
.loc-dot {
  width:7px; height:7px; border-radius:50%;
  background:#00c8a0; box-shadow:0 0 8px #00c8a0;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.5)} }
.loc-name { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#7aa8cc; }

.temp-line { line-height:1; }
.temp-num  { font-family:'DM Serif Display',serif; font-size:110px; line-height:.82; color:#e8f4ff; letter-spacing:-2px; }
.temp-deg  { font-family:'DM Serif Display',serif; font-size:40px;  color:#7aa8cc; vertical-align:super; }

.cond-row  { display:flex; align-items:center; gap:7px; margin-top:4px; }
.cond-icon { font-size:22px; }
.cond-text { font-family:'DM Serif Display',serif; font-style:italic; font-size:20px; color:#c8e6ff; }

/* 2×2 kort */
.cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:8px;
  flex:1;
}
.card {
  background:rgba(255,255,255,.07);
  border:1px solid rgba(200,230,255,.13);
  border-radius:10px;
  padding:10px 14px;
  display:flex; flex-direction:column; gap:2px;
}
.card-lbl  { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#7aa8cc; font-weight:500; }
.card-val  { font-family:'DM Serif Display',serif; font-size:30px; line-height:1.05; color:#e8f4ff; }
.card-unit { font-size:12px; color:#7aa8cc; font-weight:300; }
.card-sub  { font-size:9px; color:#7aa8cc; }

/* Neðri hluti */
.bottom {
  display:flex;
  flex-direction:row;
  justify-content:space-between;
  align-items:flex-end;
}

.clock-time { font-family:'DM Serif Display',serif; font-size:42px; line-height:1; color:#f0c060; letter-spacing:1px; }
.clock-date { font-size:11px; color:#7aa8cc; letter-spacing:1px; margin-top:2px; }

.btns-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.btns      { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
.loc-btn {
  background:rgba(255,255,255,.05);
  border:1px solid rgba(200,230,255,.15);
  border-radius:20px; color:#7aa8cc;
  font-family:'DM Sans',sans-serif;
  font-size:9px; letter-spacing:1px; padding:4px 11px;
  cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.loc-btn:hover  { background:rgba(200,230,255,.1); color:#e8f4ff; }
.loc-btn.active { border-color:#00c8a0; color:#00c8a0; }
.updated { font-size:9px; color:rgba(120,168,204,.4); }

/* Loading */
.loading {
  position:absolute; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
  background:rgba(8,18,32,.92);
  transition:opacity .4s;
}
.loading.hidden { opacity:0; pointer-events:none; }
.spin {
  width:32px; height:32px;
  border:3px solid rgba(200,230,255,.1); border-top-color:#00c8a0;
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:13px; color:#7aa8cc; letter-spacing:2px; }
</style>
</head>
<body>
<div id="app">
  <div class="bg"></div>
  <div class="stars"></div>
  <div class="mnt">
    <svg viewBox="0 0 800 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,120 L0,80 L50,58 L95,72 L130,38 L165,55 L200,20 L235,42 L265,26 L300,52 L335,12 L370,36 L400,6 L430,32 L465,14 L500,44 L535,20 L570,46 L605,25 L640,50 L675,28 L710,56 L745,34 L780,60 L800,44 L800,120 Z" fill="rgba(6,13,26,.97)"/>
      <path d="M0,120 L0,105 L70,92 L130,100 L190,84 L250,96 L310,78 L370,90 L430,74 L490,88 L550,72 L610,86 L670,70 L730,84 L800,76 L800,120 Z" fill="rgba(6,13,26,1)"/>
    </svg>
  </div>

  <div class="loading" id="loading">
    <div class="spin"></div>
    <p id="loadTxt">Sæki veðurupplýsingar…</p>
  </div>

  <div class="content">
    <div class="top">
      <div class="temp-block">
        <div class="loc-row">
          <div class="loc-dot"></div>
          <span class="loc-name" id="locName">Reykjavík</span>
        </div>
        <div class="temp-line">
          <span class="temp-num" id="tempNum">—</span><span class="temp-deg">°C</span>
        </div>
        <div class="cond-row">
          <span class="cond-icon" id="condIcon">🌡</span>
          <span class="cond-text" id="condText">Hleð…</span>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <span class="card-lbl">Vindhraði</span>
          <span class="card-val" id="wind">—<span class="card-unit"> m/s</span></span>
          <span class="card-sub" id="windDir">—</span>
        </div>
        <div class="card">
          <span class="card-lbl">Rakastig</span>
          <span class="card-val" id="hum">—<span class="card-unit"> %</span></span>
          <span class="card-sub">Hlutfallslegt</span>
        </div>
        <div class="card">
          <span class="card-lbl">Skynhiti</span>
          <span class="card-val" id="feels">—<span class="card-unit"> °C</span></span>
          <span class="card-sub">Vindkæling</span>
        </div>
        <div class="card">
          <span class="card-lbl">Úrkoma</span>
          <span class="card-val" id="precip">—<span class="card-unit"> mm</span></span>
          <span class="card-sub">Sl. klukkustund</span>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div>
        <div class="clock-time" id="clockTime">—</div>
        <div class="clock-date" id="clockDate">—</div>
      </div>
      <div class="btns-wrap">
        <div class="btns" id="locBtns">
          <button class="loc-btn active" data-lat="64.1355" data-lon="-21.8954" data-name="Reykjavík">Reykjavík</button>
          <button class="loc-btn" data-lat="65.6826" data-lon="-18.0921" data-name="Akureyri">Akureyri</button>
          <button class="loc-btn" data-lat="63.9996" data-lon="-22.5562" data-name="Keflavík">Keflavík</button>
          <button class="loc-btn" data-lat="64.6328" data-lon="-21.9581" data-name="Borgarnes">Borgarnes</button>
          <button class="loc-btn" data-lat="64.2539" data-lon="-15.2082" data-name="Höfn">Höfn</button>
        </div>
        <div class="updated" id="updated">Uppfærist sjálfkrafa á 10 mín. fresti</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Kjarnaverkefnið: skalaðu #app þannig að hann passi alltaf í gluggann ───
function skala() {
  const app = document.getElementById('app');
  const s = Math.min(window.innerWidth / 800, window.innerHeight / 450);
  app.style.transform = `scale(${s})`;
}
window.addEventListener('resize', skala);
skala();

// ─── Veður ───
const WMO = {
  0:{is:'Tært',i:'☀️'}, 1:{is:'Aðallega tært',i:'🌤'}, 2:{is:'Hlutskýjað',i:'⛅️'}, 3:{is:'Skýjað',i:'☁️'},
  45:{is:'Þoka',i:'🌫'}, 48:{is:'Hrímþoka',i:'🌫'},
  51:{is:'Létt súld',i:'🌦'}, 53:{is:'Súld',i:'🌦'}, 55:{is:'Þung súld',i:'🌧'},
  61:{is:'Létt rigning',i:'🌧'}, 63:{is:'Rigning',i:'🌧'}, 65:{is:'Þung rigning',i:'🌧'},
  71:{is:'Létt snjókoma',i:'🌨'}, 73:{is:'Snjókoma',i:'❄️'}, 75:{is:'Þung snjókoma',i:'❄️'}, 77:{is:'Snjókornaél',i:'🌨'},
  80:{is:'Létar skúrir',i:'🌦'}, 81:{is:'Skúrir',i:'🌧'}, 82:{is:'Þungar skúrir',i:'⛈'},
  85:{is:'Snjóskúrir',i:'🌨'}, 86:{is:'Þungar snjóskúrir',i:'❄️'},
  95:{is:'Þrumuveður',i:'⛈'}, 96:{is:'Þrumuveður m. hagli',i:'⛈'}, 99:{is:'Þrumuveður m. hagli',i:'⛈'},
};
function vindatt(d) {
  return ['Norðan','Norðaustan','Austan','Suðaustan','Suðan','Suðvestan','Vestan','Norðvestan'][Math.round(d/45)%8]+'vindur';
}
function skynhiti(T,v) {
  const k=v*3.6;
  return (T<=10&&k>=4.8) ? Math.round(13.12+0.6215*T-11.37*k**.16+0.3965*T*k**.16) : Math.round(T);
}

let lat=64.1355, lon=-21.8954, statur='Reykjavík';

async function saekja() {
  document.getElementById('loading').classList.remove('hidden');
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,precipitation&wind_speed_unit=ms&timezone=Atlantic/Reykjavik`);
    const {current:c} = await r.json();
    const w = WMO[c.weathercode] || {is:'Óþekkt',i:'🌡'};
    document.getElementById('tempNum').textContent  = Math.round(c.temperature_2m);
    document.getElementById('condIcon').textContent = w.i;
    document.getElementById('condText').textContent = w.is;
    document.getElementById('wind').innerHTML       = `${c.windspeed_10m.toFixed(1)}<span class="card-unit"> m/s</span>`;
    document.getElementById('windDir').textContent  = vindatt(c.winddirection_10m);
    document.getElementById('hum').innerHTML        = `${c.relativehumidity_2m}<span class="card-unit"> %</span>`;
    document.getElementById('feels').innerHTML      = `${skynhiti(c.temperature_2m,c.windspeed_10m)}<span class="card-unit"> °C</span>`;
    document.getElementById('precip').innerHTML     = `${c.precipitation.toFixed(1)}<span class="card-unit"> mm</span>`;
    document.getElementById('locName').textContent  = statur;
    const n=new Date();
    document.getElementById('updated').textContent  = `Síðast uppfært: ${p(n.getHours())}:${p(n.getMinutes())}`;
    document.getElementById('loading').classList.add('hidden');
  } catch {
    document.getElementById('loadTxt').textContent = 'Gat ekki sótt veðrið.';
    setTimeout(()=>document.getElementById('loading').classList.add('hidden'),3000);
  }
}

const DAGAR=['Sunnudagur','Mánudagur','Þriðjudagur','Miðvikudagur','Fimmtudagur','Föstudagur','Laugardagur'];
const MAN=['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
const p=n=>String(n).padStart(2,'0');

function klukka() {
  const n=new Date();
  document.getElementById('clockTime').textContent = `${p(n.getHours())}:${p(n.getMinutes())}`;
  document.getElementById('clockDate').textContent = `${DAGAR[n.getDay()]}, ${n.getDate()}. ${MAN[n.getMonth()]} ${n.getFullYear()}`;
}

document.getElementById('locBtns').addEventListener('click', e => {
  const b=e.target.closest('.loc-btn'); if(!b) return;
  document.querySelectorAll('.loc-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  lat=+b.dataset.lat; lon=+b.dataset.lon; statur=b.dataset.name;
  saekja();
});

klukka(); setInterval(klukka, 1000);
saekja(); setInterval(saekja, 600000);
</script>
</body>
</html>
