<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<title>Klukka</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#081220;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  width:100vw; height:100vh;
}
#app {
  width:800px; height:800px;
  position:relative;
  transform-origin:center center;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px;
}
.bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 40%, rgba(0,180,140,.1) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 85% 85%, rgba(80,50,220,.09) 0%, transparent 55%),
    linear-gradient(180deg, #081220 0%, #0c1a32 55%, #081220 100%);
}

/* Dagsetning */
.dagseting {
  position:relative; z-index:2;
  font-family:'DM Sans', sans-serif;
  font-size:18px; font-weight:300;
  letter-spacing:3px; text-transform:uppercase;
  color:#7aa8cc;
}

/* Klukkurammi */
.clock-wrap {
  position:relative; z-index:2;
  width:540px; height:540px;
}

canvas#klukka {
  width:540px; height:540px;
  display:block;
}

/* Hjálparlykill neðst */
.legend {
  position:relative; z-index:2;
  display:flex; gap:36px;
  font-size:14px; font-weight:400;
  color:#7aa8cc; letter-spacing:1px;
}
.legend span { display:flex; align-items:center; gap:8px; }
.dot-hour   { width:14px; height:14px; border-radius:50%; background:#f0c060; flex-shrink:0; }
.dot-min    { width:14px; height:14px; border-radius:50%; background:#e8f4ff; flex-shrink:0; }
.dot-sec    { width:14px; height:14px; border-radius:50%; background:#00c8a0; flex-shrink:0; }
</style>
</head>
<body>
<div id="app">
  <div class="bg"></div>

  <div class="dagseting" id="dagseting">—</div>

  <div class="clock-wrap">
    <canvas id="klukka" width="540" height="540"></canvas>
  </div>

  <div class="legend">
    <span><div class="dot-hour"></div>Klukkustundarvisir</span>
    <span><div class="dot-min"></div>Mínútuvisir</span>
    <span><div class="dot-sec"></div>Sekúnduvisir</span>
  </div>
</div>

<script>
// Skala #app
function skala() {
  const s = Math.min(window.innerWidth / 800, window.innerHeight / 800);
  document.getElementById('app').style.transform = `scale(${s})`;
}
window.addEventListener('resize', skala);
skala();

// Dagsetning
const DAGAR = ['Sunnudagur','Mánudagur','Þriðjudagur','Miðvikudagur','Fimmtudagur','Föstudagur','Laugardagur'];
const MAN   = ['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
function uppfDag() {
  const n = new Date();
  document.getElementById('dagseting').textContent =
    `${DAGAR[n.getDay()]}, ${n.getDate()}. ${MAN[n.getMonth()]} ${n.getFullYear()}`;
}
uppfDag();
setInterval(uppfDag, 60000);

// Canvas klukka
const canvas = document.getElementById('klukka');
const ctx    = canvas.getContext('2d');
const CX = 270, CY = 270, R = 250;

function teikna() {
  const now = new Date();
  const sek = now.getSeconds();
  const min = now.getMinutes() + sek / 60;
  const klst = (now.getHours() % 12) + min / 60;

  ctx.clearRect(0, 0, 540, 540);

  // — Bakgrunnur skífunnar —
  // Ytri glow
  const glow = ctx.createRadialGradient(CX, CY, R*0.6, CX, CY, R*1.05);
  glow.addColorStop(0, 'rgba(0,180,140,0)');
  glow.addColorStop(1, 'rgba(0,180,140,0.07)');
  ctx.beginPath();
  ctx.arc(CX, CY, R+10, 0, Math.PI*2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Skífan sjálf
  const disc = ctx.createRadialGradient(CX, CY-60, 40, CX, CY, R);
  disc.addColorStop(0,   'rgba(22,42,72,1)');
  disc.addColorStop(0.7, 'rgba(14,28,52,1)');
  disc.addColorStop(1,   'rgba(8,18,36,1)');
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.fillStyle = disc;
  ctx.fill();

  // Ytri border
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(200,230,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // — Tímamarkar —
  for (let i = 0; i < 60; i++) {
    const ang = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isHour = i % 5 === 0;
    const inner = isHour ? R - 28 : R - 14;
    const outer = R - 5;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(ang) * inner, CY + Math.sin(ang) * inner);
    ctx.lineTo(CX + Math.cos(ang) * outer, CY + Math.sin(ang) * outer);
    ctx.strokeStyle = isHour ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth   = isHour ? 3 : 1.5;
    ctx.stroke();
  }

  // — Klukkustundatölur —
  ctx.font = 'bold 26px "DM Sans"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 1; i <= 12; i++) {
    const ang = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const tx = CX + Math.cos(ang) * (R - 52);
    const ty = CY + Math.sin(ang) * (R - 52);
    ctx.fillStyle = 'rgba(200,225,255,0.85)';
    ctx.fillText(String(i), tx, ty);
  }

  // Hjálparlyklar: 5, 10, 15... á mínútumarkunum
  ctx.font = '13px "DM Sans"';
  ctx.fillStyle = 'rgba(122,168,204,0.55)';
  const minLabels = [5,10,15,20,25,30,35,40,45,50,55,60];
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const tx = CX + Math.cos(ang) * (R - 75);
    const ty = CY + Math.sin(ang) * (R - 75);
    ctx.fillText(String(minLabels[i]), tx, ty);
  }

  // ─ Vísarnir ─
  function visir(ang, len, width, color, rounded) {
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(-width/2, len * 0.15);
    ctx.lineTo(-width/2, -len);
    ctx.lineTo( width/2, -len);
    ctx.lineTo( width/2, len * 0.15);
    ctx.closePath();
    ctx.fillStyle = color;
    if (rounded) {
      ctx.shadowColor = color;
      ctx.shadowBlur  = 8;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Klukkustundarvisir — gulur, stuttur, þykkur
  visir((klst / 12) * Math.PI * 2 - Math.PI / 2, 140, 10, '#f0c060', false);

  // Mínútuvisir — hvítur, langur, minni þykkt
  visir((min / 60) * Math.PI * 2 - Math.PI / 2, 210, 6, '#e8f4ff', false);

  // Sekúnduvisir — grænn, mjór
  const sekAng = (sek / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(sekAng);
  ctx.beginPath();
  ctx.moveTo(0, 38);
  ctx.lineTo(0, -225);
  ctx.strokeStyle = '#00c8a0';
  ctx.lineWidth   = 2.5;
  ctx.shadowColor = '#00c8a0';
  ctx.shadowBlur  = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Miðpunktur
  ctx.beginPath();
  ctx.arc(CX, CY, 9, 0, Math.PI*2);
  ctx.fillStyle = '#e8f4ff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(CX, CY, 5, 0, Math.PI*2);
  ctx.fillStyle = '#00c8a0';
  ctx.fill();
}

// Hlaupa með requestAnimationFrame fyrir mjúka hreyfingu
function lykkja() {
  teikna();
  requestAnimationFrame(lykkja);
}
lykkja();
</script>
</body>
</html>
